{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MindEase | Mental Health Awareness{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'wellness/css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="text-[#2C3E35] scroll-smooth p-4">
    <div class="max-w-7xl mx-auto">
        {% include "wellness/partials/navbar.html" %}

        <main>
            {% block content %}{% endblock %}
        </main>

        {% include "wellness/partials/footer.html" %}
    </div>

    <script src="{% static 'wellness/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
